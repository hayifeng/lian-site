version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:14-alpine
    container_name: photo-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: photo_sharing
      POSTGRES_USER: photo_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_in_production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U photo_user -d photo_sharing"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./app/backend
      dockerfile: Dockerfile
    container_name: photo-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://photo_user:${DB_PASSWORD:-change_me_in_production}@db:5432/photo_sharing?schema=public
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      JWT_EXPIRES_IN: "7d"
      NODE_ENV: production
      PORT: 3001
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE: 10485760
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
    volumes:
      - uploads:/app/uploads
      - ./app/backend/.env.production:/app/.env
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Frontend (for development only - use Vercel in production)
  frontend:
    build:
      context: ./app/frontend
      dockerfile: Dockerfile
    container_name: photo-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3001/api
      NODE_ENV: production
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads:
